services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-carbon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-carbon}
      POSTGRES_DB: ${POSTGRES_DB:-carbon_index}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-carbon}:${POSTGRES_PASSWORD:-carbon}@db:5432/${POSTGRES_DB:-carbon_index}?schema=public
      HELIUS_API_KEY: ${HELIUS_API_KEY}
      HELIUS_AUTH_SECRET: ${HELIUS_AUTH_SECRET}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
